<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-6xl mx-auto p-8">
    
    <h1 class="text-3xl font-bold text-center mb-10">Our Products from {{magasine}}</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Product 1 -->
      <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <img src="https://picsum.photos/400/250?1" class="w-full h-48 object-cover">
        <div class="p-4">
          <h2 class="text-lg font-semibold">Product One</h2>
          <p class="text-gray-600 text-sm mt-2">Simple product description.</p>
          <p class="text-blue-600 font-bold mt-3">$25</p>
          <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            Buy Now
          </button>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <img src="https://picsum.photos/400/250?2" class="w-full h-48 object-cover">
        <div class="p-4">
          <h2 class="text-lg font-semibold">Product Two</h2>
          <p class="text-gray-600 text-sm mt-2">Simple product description.</p>
          <p class="text-blue-600 font-bold mt-3">$40</p>
          <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            Buy Now
          </button>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <img src="https://picsum.photos/400/250?3" class="w-full h-48 object-cover">
        <div class="p-4">
          <h2 class="text-lg font-semibold">Product Three</h2>
          <p class="text-gray-600 text-sm mt-2">Simple product description.</p>
          <p class="text-blue-600 font-bold mt-3">$60</p>
          <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            Buy Now
          </button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
