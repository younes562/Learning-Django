<!DOCTYPE html>
<html lang="fr">
<head>
    <title>{% block title %}Gestion Magasin{% endblock %}</title>
    <style>
        nav{background: #333;padding:10px;}
        nav a{color:white;margin-right:20px;text-decoration:none;}
        footer{margin-top:50px;border-top:1px solid #ccc;text-align:center;}
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'clients' %}">Clients</a>
        <a href="{% url 'products' %}">produits</a>
        <a href="{% url 'commandes' %}">commandes</a>
        <a href="{% url 'details'%}">Details</a>
        {% if request.user.is_authenticated %}
           <span style='color:#aaffaa;'><a href="{% url 'profile' %}">{{request.user.username}}</a> |</span>
           <form action="{% url 'deconnexion' %}" method="POST" style="display:inline;">
               {% csrf_token %}
               <button type="submit" style="background:none;border:none;color:#ff3333;cursor:pointer;">Deconnexion</button>
           </form>
        {% else %}
           <a href="{% url 'connexion'%}">connexion | </a>
           <a href="{% url 'register'%}">insription</a>
        {%endif%}
        <a href="{% url 'tableau_bord'%}">dashboard</a>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div> 
    <footer>
        <p>&copy;{{"maintenant"|date:"Y"}}-TP Django: Gestion Commerciale</p>
    </footer>
</body>
</html>
